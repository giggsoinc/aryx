# Aryx local stack — dev only. RDB is the source of truth; FalkorDB is the
# rebuildable graph projection. Production orchestrator (ECS/EKS/OCI) is
# decided at rollout — these containers are 12-factor and portable.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aryx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aryx}
      POSTGRES_DB: aryx
    # Host port 55432 avoids colliding with other stacks already on 5432.
    # In-network clients still reach this as postgres:5432.
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aryx"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - graphdata:/data

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_started

  # Read-only HTTP API over the FalkorDB projection (Increment 6). Reuses the
  # worker image, overriding the command to serve uvicorn. Bound to all
  # interfaces so a published port is reachable; restrict exposure at the
  # security-group / firewall layer.
  # Local LLM runtime (Increment: Ask). CPU inference is fine for sub-2B models.
  # Models persist in the ollama_models volume so they download only once.
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # One-shot: pull the menial + reason models, then exit. Re-running is a no-op
  # once the models are cached in the volume.
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen3.5:0.8b && ollama pull lfm2.5-thinking && ollama pull nomic-embed-text"]
    restart: "no"

  api:
    build: .
    env_file: .env
    command: ["uvicorn", "aryx.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # ARYX_LLM_* vars come from .env so the doc ingest + Ask API can be
    # pointed at any provider (Ollama / Gemini / Anthropic) without editing
    # this file. Defaults to local Ollama if the .env doesn't set them.
    environment:
      - ARYX_LLM_BASE_URL=${ARYX_LLM_BASE_URL:-http://ollama:11434}
      - ARYX_LLM_PROVIDER=${ARYX_LLM_PROVIDER:-ollama}
      - ARYX_LLM_MENIAL_MODEL=${ARYX_LLM_MENIAL_MODEL:-qwen3.5:0.8b}
      - ARYX_LLM_REASON_MODEL=${ARYX_LLM_REASON_MODEL:-lfm2.5-thinking:latest}
      - ARYX_LLM_API_KEY=${ARYX_LLM_API_KEY:-}
    ports:
      - "8088:8000"
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  mcp:
    build: .
    env_file: .env
    command: ["uvicorn", "aryx.mcp.sse:app", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    depends_on:
      falkordb:
        condition: service_started
    restart: unless-stopped

  ui:
    build: .
    env_file: .env
    command: ["streamlit", "run", "src/aryx/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    environment:
      - ARYX_API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Next.js web UI — isolated deploy unit. Talks to FastAPI only via HTTP.
  # No shared code with Python; replaceable without touching the backend.
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      # Server-side proxy target — Next.js rewrites /api/* to this URL.
      # Browser only talks to the same origin; no CORS, no host coupling.
      - ARYX_API_URL_INTERNAL=${ARYX_API_URL_INTERNAL:-http://api:8000}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  graphdata:
  ollama_models:
