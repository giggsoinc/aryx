# Aryx local stack — dev only. RDB is the source of truth; FalkorDB is the
# rebuildable graph projection. Production orchestrator (ECS/EKS/OCI) is
# decided at rollout — these containers are 12-factor and portable.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aryx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aryx}
      POSTGRES_DB: aryx
    # Host port 55432 avoids colliding with other stacks already on 5432.
    # In-network clients still reach this as postgres:5432.
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aryx"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - graphdata:/data

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_started

  # Read-only HTTP API over the FalkorDB projection (Increment 6). Reuses the
  # worker image, overriding the command to serve uvicorn. Bound to all
  # interfaces so a published port is reachable; restrict exposure at the
  # security-group / firewall layer.
  api:
    build: .
    env_file: .env
    command: ["uvicorn", "aryx.api.graph_api:app", "--host", "0.0.0.0", "--port", "8000"]
    # Host 8000 is taken by another stack on shared hosts; publish on 8088.
    ports:
      - "8088:8000"
    depends_on:
      falkordb:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  graphdata:
